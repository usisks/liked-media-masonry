name: Bootstrap Firefox update manifest

on:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Validate bootstrap update manifest
        shell: bash
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          gecko_id = "{6c4bffd1-76c7-4c99-ba48-367642193e15}"
          data = json.loads(Path("docs/site/firefox/updates.json").read_text(encoding="utf-8"))
          assert set(data) == {"addons"}
          assert set(data["addons"]) == {gecko_id}
          assert data["addons"][gecko_id]["updates"] == []
          print("PASS bootstrap update manifest")
          PY

      - name: Refuse to erase published update history
        shell: bash
        run: |
          set -euo pipefail
          url="https://usisks.github.io/liked-media-masonry/firefox/updates.json"
          if curl --fail --silent --show-error --location "$url" -o /tmp/existing-updates.json; then
            python - <<'PY'
          import json
          data = json.load(open("/tmp/existing-updates.json", encoding="utf-8"))
          gecko_id = "{6c4bffd1-76c7-4c99-ba48-367642193e15}"
          updates = data["addons"][gecko_id]["updates"]
          if updates:
              raise SystemExit("Refusing to replace non-empty public update history with bootstrap data")
          print("PASS existing public manifest is still an empty bootstrap")
          PY
          fi

      - name: Configure Pages
        uses: actions/configure-pages@983d7736d9b0ae728b81ab479565c72886d7745b # v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@7b1f4a764d45c48632c6b24a0339c27f5614fb0b # v4
        with:
          path: docs/site

      - name: Deploy Pages
        id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4

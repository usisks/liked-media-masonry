name: Sign and release browser packages

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: Existing vVERSION tag to release
        required: true
        type: string

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: release-${{ inputs.tag || github.ref_name }}
  cancel-in-progress: false

env:
  GECKO_ID: "{6c4bffd1-76c7-4c99-ba48-367642193e15}"
  UPDATE_URL: https://usisks.github.io/liked-media-masonry/firefox/updates.json

jobs:
  release:
    runs-on: ubuntu-latest
    outputs:
      release_url: ${{ steps.outputs.outputs.release_url }}
      xpi_url: ${{ steps.outputs.outputs.xpi_url }}
      xpi_sha256: ${{ steps.outputs.outputs.xpi_sha256 }}
      version: ${{ steps.outputs.outputs.version }}
    steps:
      - name: Check out release tag
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          ref: ${{ inputs.tag || github.ref }}

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 24
          cache: npm

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements-dev.txt

      - name: Install dependencies
        run: |
          npm ci
          python -m pip install --disable-pip-version-check -r requirements-dev.txt
          python -m playwright install --with-deps chromium

      - name: Validate tag, version, secrets, and Pages bootstrap
        shell: bash
        env:
          RELEASE_TAG: ${{ inputs.tag || github.ref_name }}
          WEB_EXT_API_KEY: ${{ secrets.WEB_EXT_API_KEY }}
          WEB_EXT_API_SECRET: ${{ secrets.WEB_EXT_API_SECRET }}
        run: |
          set -euo pipefail
          : "${WEB_EXT_API_KEY:?Missing WEB_EXT_API_KEY repository secret}"
          : "${WEB_EXT_API_SECRET:?Missing WEB_EXT_API_SECRET repository secret}"
          VERSION="$(python -c 'import json; print(json.load(open("manifest.json", encoding="utf-8"))["version"])')"
          test "$RELEASE_TAG" = "v$VERSION"
          test -f "docs/RELEASE_NOTES-v$VERSION.md"
          curl --fail --silent --show-error --location --retry 5 --retry-all-errors "$UPDATE_URL" -o /tmp/bootstrap-updates.json
          python - <<'PY'
          import json, os
          data = json.load(open("/tmp/bootstrap-updates.json", encoding="utf-8"))
          assert set(data) == {"addons"}
          assert set(data["addons"]) == {os.environ["GECKO_ID"]}
          assert isinstance(data["addons"][os.environ["GECKO_ID"]]["updates"], list)
          print("PASS public update manifest bootstrap")
          PY

      - name: Run full validation
        run: |
          npm run audit:release
          npm run test:all
          npm run build
          npm run lint:firefox

      - name: Sign Firefox package through AMO unlisted
        shell: bash
        env:
          WEB_EXT_API_KEY: ${{ secrets.WEB_EXT_API_KEY }}
          WEB_EXT_API_SECRET: ${{ secrets.WEB_EXT_API_SECRET }}
        run: |
          set -euo pipefail
          rm -rf dist/signed
          mkdir -p dist/signed
          npx web-ext sign \
            --source-dir dist/firefox \
            --artifacts-dir dist/signed \
            --channel unlisted \
            --api-key "$WEB_EXT_API_KEY" \
            --api-secret "$WEB_EXT_API_SECRET" \
            --no-input
          mapfile -t signed_xpis < <(find dist/signed -maxdepth 1 -type f -name '*.xpi')
          test "${#signed_xpis[@]}" -eq 1
          VERSION="$(python -c 'import json; print(json.load(open("manifest.json", encoding="utf-8"))["version"])')"
          cp "${signed_xpis[0]}" "dist/liked-media-masonry-firefox-floorp-v${VERSION}.xpi"
          python tools/release_audit.py \
            --source . \
            --archive "dist/liked-media-masonry-firefox-floorp-v${VERSION}.xpi" \
            --browser firefox \
            --require-signed

      - name: Prepare checksums and draft release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ inputs.tag || github.ref_name }}
        run: |
          set -euo pipefail
          VERSION="${RELEASE_TAG#v}"
          CHROME="dist/liked-media-masonry-chrome-v${VERSION}.zip"
          XPI="dist/liked-media-masonry-firefox-floorp-v${VERSION}.xpi"
          (cd dist && sha256sum "$(basename "$CHROME")" "$(basename "$XPI")" > SHA256SUMS.txt)
          cp "docs/RELEASE_NOTES-${RELEASE_TAG}.md" dist/release-notes.md
          printf '\n## SHA-256\n\n```text\n' >> dist/release-notes.md
          cat dist/SHA256SUMS.txt >> dist/release-notes.md
          printf '```\n' >> dist/release-notes.md

          if release_json="$(gh release view "$RELEASE_TAG" --json isDraft,url 2>/dev/null)"; then
            test "$(python -c 'import json,sys; print(str(json.load(sys.stdin)["isDraft"]).lower())' <<<"$release_json")" = true
            gh release edit "$RELEASE_TAG" --notes-file dist/release-notes.md
          else
            gh release create "$RELEASE_TAG" \
              --draft \
              --title "Liked Media Masonry $RELEASE_TAG" \
              --notes-file dist/release-notes.md \
              --verify-tag
          fi
          gh release upload "$RELEASE_TAG" "$CHROME" "$XPI" dist/SHA256SUMS.txt --clobber

      - name: Publish release and verify public assets
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ inputs.tag || github.ref_name }}
        run: |
          set -euo pipefail
          VERSION="${RELEASE_TAG#v}"
          CHROME_NAME="liked-media-masonry-chrome-v${VERSION}.zip"
          XPI_NAME="liked-media-masonry-firefox-floorp-v${VERSION}.xpi"
          gh release edit "$RELEASE_TAG" --draft=false --latest
          RELEASE_URL="https://github.com/${GITHUB_REPOSITORY}/releases/tag/${RELEASE_TAG}"
          XPI_URL="https://github.com/${GITHUB_REPOSITORY}/releases/download/${RELEASE_TAG}/${XPI_NAME}"
          CHROME_URL="https://github.com/${GITHUB_REPOSITORY}/releases/download/${RELEASE_TAG}/${CHROME_NAME}"
          curl --fail --silent --show-error --location --retry 8 --retry-all-errors "$XPI_URL" -o /tmp/released.xpi
          curl --fail --silent --show-error --location --retry 8 --retry-all-errors "$CHROME_URL" -o /tmp/released.zip
          test "$(sha256sum /tmp/released.xpi | cut -d' ' -f1)" = "$(sha256sum "dist/$XPI_NAME" | cut -d' ' -f1)"
          test "$(sha256sum /tmp/released.zip | cut -d' ' -f1)" = "$(sha256sum "dist/$CHROME_NAME" | cut -d' ' -f1)"
          echo "RELEASE_URL=$RELEASE_URL" >> "$GITHUB_ENV"
          echo "XPI_URL=$XPI_URL" >> "$GITHUB_ENV"

      - name: Build next Pages update manifest
        shell: bash
        run: |
          set -euo pipefail
          VERSION="$(python -c 'import json; print(json.load(open("manifest.json", encoding="utf-8"))["version"])')"
          mkdir -p dist/site/firefox
          cp -R docs/site/. dist/site/
          curl --fail --silent --show-error --location --retry 5 --retry-all-errors "$UPDATE_URL" -o dist/current-updates.json
          python tools/update_manifest.py \
            --input dist/current-updates.json \
            --output dist/site/firefox/updates.json \
            --xpi "dist/liked-media-masonry-firefox-floorp-v${VERSION}.xpi" \
            --update-link "$XPI_URL" \
            --require-signed

      - name: Configure Pages
        uses: actions/configure-pages@983d7736d9b0ae728b81ab479565c72886d7745b # v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@7b1f4a764d45c48632c6b24a0339c27f5614fb0b # v4
        with:
          path: dist/site

      - name: Export workflow outputs
        id: outputs
        shell: bash
        run: |
          VERSION="$(python -c 'import json; print(json.load(open("manifest.json", encoding="utf-8"))["version"])')"
          XPI="dist/liked-media-masonry-firefox-floorp-v${VERSION}.xpi"
          echo "release_url=$RELEASE_URL" >> "$GITHUB_OUTPUT"
          echo "xpi_url=$XPI_URL" >> "$GITHUB_OUTPUT"
          echo "xpi_sha256=$(sha256sum "$XPI" | cut -d' ' -f1)" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

  deploy-pages:
    needs: release
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy Pages
        id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4

  verify-publication:
    needs:
      - release
      - deploy-pages
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Verify public update manifest and signed XPI
        shell: bash
        env:
          VERSION: ${{ needs.release.outputs.version }}
          XPI_URL: ${{ needs.release.outputs.xpi_url }}
          XPI_SHA256: ${{ needs.release.outputs.xpi_sha256 }}
        run: |
          set -euo pipefail
          for attempt in $(seq 1 20); do
            if curl --fail --silent --show-error --location \
              -H 'Cache-Control: no-cache' \
              "${UPDATE_URL}?verification=${GITHUB_RUN_ID}-${attempt}" \
              -o /tmp/updates.json; then
              if python - <<'PY'
          import json, os, sys
          data = json.load(open("/tmp/updates.json", encoding="utf-8"))
          entries = data["addons"][os.environ["GECKO_ID"]]["updates"]
          matches = [entry for entry in entries if entry.get("version") == os.environ["VERSION"]]
          if len(matches) != 1:
              sys.exit(1)
          entry = matches[0]
          assert entry["update_link"] == os.environ["XPI_URL"]
          assert entry["update_hash"] == f"sha256:{os.environ['XPI_SHA256']}"
          assert entry["applications"]["gecko"]["strict_min_version"] == "140.0"
          PY
              then
                break
              fi
            fi
            test "$attempt" -lt 20
            sleep 6
          done
          curl --fail --silent --show-error --location "$XPI_URL" -o /tmp/released.xpi
          test "$(sha256sum /tmp/released.xpi | cut -d' ' -f1)" = "$XPI_SHA256"
          python tools/release_audit.py \
            --source . \
            --archive /tmp/released.xpi \
            --browser firefox \
            --require-signed
          echo "PASS public Release asset and Pages update manifest agree"
